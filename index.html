<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Exam Clock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Clock</title>
<style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0b10;
    color: #e2e8f0;
    font-family: 'DM Mono', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 24px;
    gap: 0;
  }

  /* テーマ切り替えボタン（画面右上に固定） */
  .global-theme-toggle-bar {
    width: 100%; display: flex; justify-content: flex-end;
    background: #0d0e14; border-bottom: 1px solid #1e293b;
    position: sticky; top: 0; z-index: 50;
  }
  .global-theme-toggle {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 16px;
    font-size: 16px; color: #64748b;
    cursor: pointer; transition: all .2s;
  }
  .global-theme-toggle:hover { color: #a5b4fc; background: rgba(99,102,241,0.08); }

  /* ══════════════════════════════
     各パネル共通コンテナ
     ══════════════════════════════ */
  .clock-panel {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 20px 16px;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .clock-panel.active { display: flex; }

  .top-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; width:100%; }
  .title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.3em; color: #475569; text-transform: uppercase; }
  .lang-btns { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-left:auto; }
  .lang-btn { background: #0f1020; border: 1px solid #1e293b; border-radius: 6px; color: #64748b; font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 8px; cursor: pointer; transition: all .2s; }
  .lang-btn.active, .lang-btn:hover { background: #6366f1; border-color: #6366f1; color: #fff; }

  .theme-toggle {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 6px;
    color: #64748b; font-size: 14px; padding: 4px 8px; cursor: pointer;
    transition: all .2s;
  }
  .theme-toggle:hover { border-color: #6366f1; }

  canvas { display: block; width: min(92vw, 460px); height: min(92vw, 460px); }

  /* ══════════════════════════════
     受験用タブ専用スタイル
     ══════════════════════════════ */

  /* プリセット期間選択 */
  .preset-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    max-width: 480px;
  }
  .preset-tab {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 20px;
    color: #64748b; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 7px 14px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .preset-tab.active { background: #4338ca; border-color: #6366f1; color: #fff; }
  .preset-tab:hover:not(.active) { border-color: #4338ca; color: #a5b4fc; }

  /* 表示モード切替 */
  .view-mode-row {
    display: flex; gap: 6px; justify-content: center;
  }
  .view-mode-btn {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 8px;
    color: #64748b; font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 6px 12px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .view-mode-btn.active {
    background: #4338ca; border-color: #6366f1; color: #fff;
  }
  .view-mode-btn:hover:not(.active) { border-color: #4338ca; color: #a5b4fc; }


  .center-display { text-align: center; }
  .center-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(24px, 6vw, 34px);
    font-weight: 300; color: #e2e8f0; letter-spacing: 0.05em;
  }
  .center-label { font-size: 12px; color: #64748b; margin-top: 2px; letter-spacing: 0.05em; }

  /* 期間設定パネル */
  .period-box {
    width: min(92vw, 460px);
    background: #0f1020; border: 1px solid #1e293b; border-radius: 14px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
  }
  .period-box label { font-size: 11px; letter-spacing: 0.2em; color: #475569; text-transform: uppercase; }
  .period-row { display: flex; gap: 8px; align-items: flex-end; }
  .period-row input[type="text"] {
    flex: 1; background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 8px 10px; outline: none; transition: border-color .2s;
  }
  .period-date-field { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .period-date-caption {
    font-size: 9px; letter-spacing: 0.08em; color: #475569;
    text-transform: uppercase; white-space: nowrap;
  }
  body.light-mode .period-date-caption { color: #64748b; }
  .period-row input[type="date"] {
    width: 100%; background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 8px 10px; outline: none; transition: border-color .2s;
  }
  .period-row input:focus { border-color: #6366f1; }
  .period-row button {
    background: #6366f1; border: none; border-radius: 8px; color: #fff;
    font-size: 13px; font-weight: 700; padding: 8px 16px; cursor: pointer;
    white-space: nowrap; transition: opacity .2s;
  }
  .period-row button:hover { opacity: .8; }

  /* サブ目標パネル */
  .event-panel {
    width: min(92vw, 460px);
    background: #0f1020; border: 1px solid #1e293b; border-radius: 14px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
  }
  .event-panel-title { font-size: 11px; letter-spacing: 0.2em; color: #475569; text-transform: uppercase; }
  .event-add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; }
  .event-add-row input {
    background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 10px; outline: none; width: 100%;
  }
  /* 日付入力欄：初見でも「これは何の日付か」が分かるよう、上に小さな見出しを添える */
  .milestone-date-field { display: flex; flex-direction: column; gap: 3px; }
  .milestone-date-caption {
    font-size: 9px; letter-spacing: 0.08em; color: #475569;
    text-transform: uppercase; white-space: nowrap;
  }
  body.light-mode .milestone-date-caption { color: #64748b; }
  .add-btn { grid-column: 1/-1; background: #6366f1; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; padding: 9px; cursor: pointer; transition: opacity .2s; }
  .add-btn:hover { opacity: .8; }
  .event-list { display: flex; flex-direction: column; gap: 7px; }
  .event-item { display: flex; align-items: center; gap: 10px; background: #0a0b10; border: 1px solid #1e293b; border-radius: 10px; padding: 9px 12px; }
  .event-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .event-info { flex: 1; min-width: 0; }
  .event-name { font-size: 13px; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-meta { font-size: 10px; color: #475569; margin-top: 2px; }
  .event-days { font-family: 'DM Mono', monospace; font-size: 16px; color: #e2e8f0; flex-shrink: 0; text-align: right; min-width: 55px; }
  .event-days small { font-size: 10px; color: #475569; margin-left: 2px; }
  .event-delete { background: none; border: none; color: #334155; font-size: 16px; cursor: pointer; padding: 0 4px; }
  .event-delete:hover { color: #f87171; }
  .event-edit { background: none; border: none; color: #334155; font-size: 14px; cursor: pointer; padding: 0 4px; transition: color .2s; }
  .event-edit:hover { color: #818cf8; }

  /* 色選択パレット（視認性向上版） */
  .color-picker-row {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-top: 4px; align-items: center;
  }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: all .15s;
    position: relative;
  }
  .color-swatch.selected {
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }
  .color-swatch.selected::after {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .color-picker-label {
    font-size: 11px; color: #475569; width: 100%; text-align: center;
    margin-bottom: 2px;
  }

  /* 編集モーダル */
  .edit-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 150;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center; padding: 20px;
  }
  .edit-modal-overlay.on { display: flex; }
  .edit-modal {
    background: #0f1020; border: 1px solid #334155; border-radius: 16px;
    padding: 24px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .edit-modal-title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .edit-modal input[type="text"], .edit-modal input[type="date"] {
    background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 9px 12px; outline: none; width: 100%;
    transition: border-color .2s;
  }
  .edit-modal input.input-error {
    border-color: #f87171;
    animation: shakeInput .3s;
  }
  @keyframes shakeInput {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .edit-modal-btns { display: flex; gap: 8px; margin-top: 6px; }
  .edit-modal-btns button {
    flex: 1; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer;
    transition: opacity .2s;
  }
  .edit-modal-btns button:hover { opacity: .85; }
  .edit-save-btn { background: #6366f1; color: #fff; }
  .edit-cancel-btn { background: #1e293b; color: #94a3b8; }

  /* データ管理パネル */
  /* 削除確認モーダル */
  .confirm-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 160;
    background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center; padding: 20px;
  }
  .confirm-modal-overlay.on { display: flex; }
  .confirm-modal {
    background: #0f1020; border: 1px solid #f87171; border-radius: 16px;
    padding: 24px; width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 14px;
    text-align: center;
  }
  .confirm-modal-icon { font-size: 36px; }
  .confirm-modal-msg { font-size: 14px; color: #e2e8f0; line-height: 1.6; }
  .confirm-modal-sub { font-size: 12px; color: #64748b; }
  .confirm-modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .confirm-modal-btns button {
    flex: 1; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer;
    transition: opacity .2s;
  }
  .confirm-modal-btns button:hover { opacity: .85; }
  .confirm-delete-btn { background: #f87171; color: #fff; }
  .confirm-cancel-btn { background: #1e293b; color: #94a3b8; }

  /* 妊娠期間の起点選択モーダル */
  .preg-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 155;
    background: rgba(0,0,0,0.78);
    align-items: center; justify-content: center; padding: 20px;
  }
  .preg-modal-overlay.on { display: flex; }
  .preg-modal {
    background: #0f1020; border: 1px solid #334155; border-radius: 16px;
    padding: 22px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .preg-modal-title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .preg-toggle-row {
    display: flex; gap: 6px; background: #0a0b10; border-radius: 10px; padding: 4px;
  }
  .preg-toggle-btn {
    flex: 1; background: none; border: none; border-radius: 8px;
    color: #64748b; font-family: 'DM Mono', monospace; font-size: 12.5px;
    padding: 9px; cursor: pointer; transition: all .2s;
  }
  .preg-toggle-btn.active {
    background: #6366f1; color: #fff;
  }
  .preg-toggle-btn:hover:not(.active) { color: #94a3b8; }
  .preg-option-row { display: flex; gap: 8px; }
  .preg-option-row input[type="date"] {
    flex: 1; background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 8px 10px; outline: none;
  }
  .preg-option-row button {
    background: #6366f1; border: none; border-radius: 8px; color: #fff;
    font-size: 12.5px; font-weight: 700; padding: 8px 14px; cursor: pointer;
    white-space: nowrap; transition: opacity .2s;
  }
  .preg-option-row button:hover { opacity: .85; }
  .preg-modal-cancel {
    background: none; border: 1px solid #1e293b; border-radius: 8px;
    color: #64748b; font-size: 12.5px; padding: 8px; cursor: pointer;
    transition: all .2s;
  }
  .preg-modal-cancel:hover { border-color: #334155; color: #94a3b8; }

  /* 期間外マイルストーン確認モーダル */
  .range-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 158;
    background: rgba(0,0,0,0.78);
    align-items: center; justify-content: center; padding: 20px;
  }
  .range-modal-overlay.on { display: flex; }
  .range-modal {
    background: #0f1020; border: 1px solid #fbbf24; border-radius: 16px;
    padding: 22px; width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 12px;
    text-align: center;
  }
  .range-modal-icon { font-size: 32px; }
  .range-modal-msg { font-size: 13.5px; color: #e2e8f0; line-height: 1.6; }
  .range-modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .range-modal-btns button {
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    padding: 10px; cursor: pointer; transition: opacity .2s;
  }
  .range-modal-btns button:hover { opacity: .85; }
  .range-extend-btn { background: #fbbf24; color: #1a1a0a; }
  .range-cancel-btn { background: #1e293b; color: #94a3b8; }

  /* 今日に戻るボタン */
  .today-reset-btn {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 8px;
    color: #64748b; font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 6px 12px; cursor: pointer; transition: all .2s;
  }
  .today-reset-btn:hover { border-color: #6366f1; color: #a5b4fc; }

  /* オーバーフローしたマイルストーンのリスト表示 */
  .overflow-notice {
    font-size: 11px; color: #94a3b8; text-align: center;
    padding: 6px; display: none;
    line-height: 2;
  }
  .overflow-notice.show { display: block; }
  .overflow-notice-label { color: #64748b; margin-right: 2px; }
  .overflow-notice-item {
    display: inline-flex; align-items: center; gap: 4px;
    margin: 0 6px; white-space: nowrap;
  }
  .overflow-notice-dot {
    width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
  }
  /* フォームエラーメッセージ */
  .form-error {
    font-size: 12px; color: #f87171;
    display: none; padding: 2px 2px 0;
  }
  .form-error.show { display: block; }

  .data-panel {
    width: min(92vw, 460px);
    background: #0f1020; border: 1px solid #1e293b; border-radius: 14px;
    padding: 14px 18px; display: flex; flex-direction: column; gap: 10px;
  }
  .data-panel-title { font-size: 11px; letter-spacing: 0.2em; color: #475569; text-transform: uppercase; }
  .data-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .data-btn {
    flex: 1; min-width: 100px;
    background: #0a0b10; border: 1px solid #1e293b; border-radius: 8px;
    color: #94a3b8; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 9px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .data-btn:hover { border-color: #6366f1; color: #a5b4fc; }
  #exam-importFileInput { display: none; }

  /* 共有ボタン */
  .share-row {
    display: flex; gap: 8px; justify-content: center;
  }
  .share-btn {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 10px;
    color: #94a3b8; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 16px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .share-btn:hover { border-color: #6366f1; color: #a5b4fc; }
  .share-size-select {
    background: #0f1020; border: 1px solid #1e293b; border-radius: 10px;
    color: #94a3b8; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 10px; cursor: pointer; outline: none;
  }
  .share-size-select option { background: #0f1020; }

  /* トースト通知 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e1b4b; border: 1px solid #6366f1; border-radius: 10px;
    color: #e2e8f0; font-size: 13px; padding: 12px 20px;
    z-index: 300; opacity: 0; transition: all .3s ease;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 効果音の代わりの視覚フィードバック：トーストを短く光らせる */
  .toast.toast-flash-success {
    box-shadow: 0 0 0 4px rgba(52,211,153,0.5), 0 8px 24px rgba(0,0,0,0.4);
    border-color: #34d399;
  }
  .toast.toast-flash-subtle {
    box-shadow: 0 0 0 4px rgba(248,113,113,0.4), 0 8px 24px rgba(0,0,0,0.4);
    border-color: #f87171;
  }

  /* ライトモード対応 */
  body.light-mode {
    background: #f8fafc; color: #1e293b;
  }
  body.light-mode .top-bar .title { color: #94a3b8; }
  body.light-mode .lang-btn, body.light-mode .preset-tab, body.light-mode .view-mode-btn,
  body.light-mode .period-box, body.light-mode .event-panel, body.light-mode .data-panel,
  body.light-mode .edit-modal {
    background: #ffffff; border-color: #e2e8f0; color: #475569;
  }
  body.light-mode .event-item, body.light-mode .data-btn,
  body.light-mode .period-row input, body.light-mode .event-add-row input {
    background: #f1f5f9; border-color: #e2e8f0; color: #334155;
  }
  /* .event-name と .event-days は個別にcolorを指定しているため、
     親のcolor指定だけでは上書きされず、ライトモードでも暗いモード用の
     薄い文字色のままになってしまっていた（明るい背景に薄い文字＝読めない）。
     ここで明示的に上書きする。 */
  body.light-mode .event-name, body.light-mode .event-days {
    color: #1e293b;
  }
  body.light-mode .event-meta, body.light-mode .event-days small {
    color: #64748b;
  }
  body.light-mode .center-num { color: #1e293b; }
  body.light-mode footer { color: #cbd5e1; }

  /* 上のライトモード規則は「body.light-mode」を含むぶん詳細度が高く、
     .lang-btn.active 等の選択中スタイル（詳細度が低い）を無条件に
     上書きしてしまい、ライトモードではどのボタンが選択中か
     分からなくなっていた。ここで選択中スタイルを明示的に再指定する。 */
  body.light-mode .lang-btn.active, body.light-mode .lang-btn:hover {
    background: #6366f1; border-color: #6366f1; color: #fff;
  }
  body.light-mode .preset-tab.active, body.light-mode .view-mode-btn.active {
    background: #4338ca; border-color: #6366f1; color: #fff;
  }

  footer { font-size: 11px; color: #1e293b; letter-spacing: 0.1em; text-align: center; }

  @media (max-width: 380px) { .event-add-row, .period-row { grid-template-columns: 1fr; } }

// ── プリセットタブ構築 ──
function examBuildPresetTabs(){
  const wrap=document.getElementById('exam-presetTabs');
  const presets=examGetPresets();
  wrap.innerHTML=presets.map(p=>
    `<button class="preset-tab ${p.key===examCurrentPresetKey?'active':''}" onclick="examSelectPreset('${p.key}')">${p.icon} ${p.label}</button>`
  ).join('');
}

function examSelectPreset(key){
  examCurrentPresetKey=key;
  document.querySelectorAll('.preset-tab').forEach(t=>t.classList.remove('active'));
  event.target.closest('.preset-tab').classList.add('active');

  if(key==='custom'){
    // カスタムの場合は入力欄にフォーカスを促すのみ
    examSave();
    return;
  }

  if(key==='pregnancy'){
    examOpenPregnancyStartModal();
    return;
  }

  examSelectPresetByKey(key);
}

// プリセット反映処理そのもの（クリックイベントに依存しない形で分離）
// 「今日に戻る」からも呼べるようにするため examSelectPreset とは切り離した
function examSelectPresetByKey(key){
  const presets=examGetPresets();
  const preset=presets.find(p=>p.key===key);
  if(!preset || preset.days===null) return;

  const today=new Date(); today.setHours(0,0,0,0);
  const end=new Date(today.getTime()+preset.days*86400000);

  examPeriodStart=today.getTime();
  examPeriodEnd=end.getTime();
  examPeriodName=preset.label;

  document.getElementById('exam-periodStart').value=today.toISOString().split('T')[0];
  document.getElementById('exam-periodEnd').value=end.toISOString().split('T')[0];
  document.getElementById('exam-periodName').value=preset.label;

  examSave();
  examCheckOutOfRangeMilestones();
}

//    入力欄1つ・ボタン1つで完結させる（以前は別々の入力行が2組あり手続き的だった）
let examPregMode = 'lmp'; // 'lmp' | 'due'

function examOpenPregnancyStartModal(){
  examHideFormError(document.getElementById('exam-pregError'));
  examClearFieldError(document.getElementById('exam-pregDateInput'));
  document.getElementById('exam-pregDateInput').value = '';
  examSetPregMode('lmp', document.getElementById('exam-pregToggleLMP'));
  document.getElementById('exam-pregModalOverlay').classList.add('on');
}
function examClosePregnancyModal(){
  document.getElementById('exam-pregModalOverlay').classList.remove('on');
}

function examSetPregMode(mode, btn){
  examPregMode = mode;
  document.querySelectorAll('.preg-toggle-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

function examSubmitPregnancyDate(){
  const dateInput=document.getElementById('exam-pregDateInput');
  const errEl=document.getElementById('exam-pregError');
  examClearFieldError(dateInput); examHideFormError(errEl);

  const val=dateInput.value;
  if(!val){
    examShowFieldError(dateInput, errEl, examL.errNoDate||'Please enter a date');
    return;
  }

  const dateMs=new Date(val).setHours(0,0,0,0);
  // 最終月経日（LMP）からは280日後を出産予定日、
  // 出産予定日からは280日前を起点とする、一般的な妊娠期間の計算式
  let start, end;
  if(examPregMode==='lmp'){
    start = dateMs;
    end = dateMs + 280*86400000;
  } else {
    end = dateMs;
    start = dateMs - 280*86400000;
  }
  examApplyPregnancyPeriod(start, end);
}

function examApplyPregnancyPeriod(start, end){
  examPeriodStart=start;
  examPeriodEnd=end;
  examPeriodName=examL.presetPregnancy||'Pregnancy';
  examCurrentPresetKey='pregnancy';
  document.getElementById('exam-periodStart').value=new Date(start).toISOString().split('T')[0];
  document.getElementById('exam-periodEnd').value=new Date(end).toISOString().split('T')[0];
  document.getElementById('exam-periodName').value=examPeriodName;
  document.getElementById('exam-pregDateInput').value='';
  examBuildPresetTabs();
  examSave();
  examCheckOutOfRangeMilestones();
  examClosePregnancyModal();
  examPlaySuccessSound();
  examShowToast(examL.toastPeriodSet||'Period set!');
}

function examSetCustomPeriod(){
  const nameInput=document.getElementById('exam-periodName');
  const startInput=document.getElementById('exam-periodStart');
  const endInput=document.getElementById('exam-periodEnd');
  const errEl=document.getElementById('exam-periodError');

  examClearFieldError(nameInput); examClearFieldError(startInput); examClearFieldError(endInput);
  examHideFormError(errEl);

  const name=nameInput.value.trim();
  const s=startInput.value;
  const e=endInput.value;

  if(!s){
    examShowFieldError(startInput, errEl, examL.errNoStart||'Please enter a start date');
    return;
  }
  if(!e){
    examShowFieldError(endInput, errEl, examL.errNoEnd||'Please enter an end date');
    return;
  }
  const sMs=new Date(s).setHours(0,0,0,0);
  const eMs=new Date(e).setHours(0,0,0,0);
  if(eMs<=sMs){
    examShowFieldError(endInput, errEl, examL.errEndBeforeStart||'End date must be after start date');
    return;
  }

  examPeriodStart=sMs;
  examPeriodEnd=eMs;
  examPeriodName=name||examL.presetCustom;
  examCurrentPresetKey='custom';
  examBuildPresetTabs();
  examSave();
  examCheckOutOfRangeMilestones();
  examPlaySuccessSound();
  examShowToast(examL.toastPeriodSet||'Period set!');
}

// 日付欄を手動で編集したとき、プリセットの選択状態を解除する
// （「プリセットを押した後、こっそり日付だけ変えた」という曖昧な状態を防ぐ）
function examOnManualPeriodEdit(){
  if(examCurrentPresetKey!=='custom'){
    examCurrentPresetKey='custom';
    examBuildPresetTabs();
  }
}

// 「今日に戻る」— 期間設定を今日起点で再構築する（現在選択中のプリセット種別を維持）
// 「今日に戻る」— 期間設定を今日起点で再構築する
// プリセットの場合はそのプリセットの日数をそのまま今日から再計算する。
// カスタムの場合は「期間の長さ（日数）」を維持したまま、開始日を今日にスライドさせる。
// （終了日だけ据え置いて開始日のみ変えると期間の長さが変わってしまい、
//   ユーザーが意図しない期間になる問題があったため、長さを保つ方式に統一した）
function examResetToToday(){
  if(examCurrentPresetKey==='custom'){
    if(examPeriodStart===null || examPeriodEnd===null){
      examShowToast(examL.toastResetToday||'Reset to today');
      return;
    }
    const durationMs = examPeriodEnd - examPeriodStart;
    const today = new Date(); today.setHours(0,0,0,0);
    const newEnd = today.getTime() + durationMs;

    examPeriodStart = today.getTime();
    examPeriodEnd = newEnd;

    document.getElementById('exam-periodStart').value = today.toISOString().split('T')[0];
    document.getElementById('exam-periodEnd').value = new Date(newEnd).toISOString().split('T')[0];
    examSave();
    examCheckOutOfRangeMilestones();
    examShowToast(examL.toastResetToday||'Reset to today');
    return;
  }
  examSelectPresetByKey(examCurrentPresetKey);
  examShowToast(examL.toastResetToday||'Reset to today');
}

  examClearFieldError(nameInput); examClearFieldError(dateInput);

// 「期間を延長」を選んだ場合：期間の開始・終了をマイルストーンの日付を含むように広げる
function examExtendPeriodForEvent(){
  if(!examPendingOutOfRangeEvent) return;
  const { dateMs } = examPendingOutOfRangeEvent;

  if(examPeriodStart!==null && dateMs<examPeriodStart) examPeriodStart=dateMs;
  if(examPeriodEnd!==null && dateMs>examPeriodEnd) examPeriodEnd=dateMs;
  examPeriodName = examPeriodName || examL.presetCustom;
  examCurrentPresetKey='custom';

  document.getElementById('exam-periodStart').value=new Date(examPeriodStart).toISOString().split('T')[0];
  document.getElementById('exam-periodEnd').value=new Date(examPeriodEnd).toISOString().split('T')[0];
  examBuildPresetTabs();
  examSave();

  const pending = examPendingOutOfRangeEvent;
  examCloseRangeModal();

  if(pending.mode==='add'){
    examFinalizeAddEvent(pending.name, pending.dateMs, pending.color);
  } else if(pending.mode==='edit'){
    examFinalizeEditEvent(pending.id, pending.name, pending.dateMs, pending.color);
  }
}

// 派手なモーダルは出さず、その日1回だけ音とトーストで知らせる程度に留める
// （Year Clock/Life Clockの達成モーダルほど重い演出はAny Clockの用途には過剰なため）
let _examCelebratedToday = null;
function examCheckTodaysMilestones(){
  const todayKey = new Date().toISOString().split('T')[0];
  let celebratedSet;
  try {
    celebratedSet = JSON.parse(localStorage.getItem('mc_exam_celebrated_'+todayKey) || '[]');
  } catch(e){ celebratedSet = []; }

  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todaysEvents = examEvents.filter(ev=>{
    const d=new Date(ev.dateMs); d.setHours(0,0,0,0);
    return d.getTime()===today0.getTime() && !celebratedSet.includes(ev.id);
  });

  if(todaysEvents.length>0){
    examPlayCelebrationSound();
    const names = todaysEvents.map(e=>e.name).join(', ');
    examShowToast(`🎉 ${names}`);
    const newSet = celebratedSet.concat(todaysEvents.map(e=>e.id));
    try { localStorage.setItem('mc_exam_celebrated_'+todayKey, JSON.stringify(newSet)); } catch(e){}
  }
}

// インポートデータの形式を検証する。
// 「JSONとしてパースできる」だけでは不十分で、期待するフィールドの型まで確認しないと
// 壊れたファイルや別アプリのJSONを読み込ませたときに画面が崩れる。
function examValidateImportData(data){
  if(!data || typeof data !== 'object') return 'Invalid file format';

  if(data.period !== undefined){
    const p = data.period;
    if(typeof p !== 'object' || p===null) return 'Invalid period data';
    if(p.examPeriodStart !== null && typeof p.examPeriodStart !== 'number') return 'Invalid period start date';
    if(p.examPeriodEnd !== null && typeof p.examPeriodEnd !== 'number') return 'Invalid period end date';
    if(p.examPeriodStart!==null && p.examPeriodEnd!==null && p.examPeriodEnd <= p.examPeriodStart){
      return 'Period end date must be after start date';
    }
  }

  if(data.examEvents !== undefined){
    if(!Array.isArray(data.examEvents)) return 'Invalid milestones data';
    for(const ev of data.examEvents){
      if(typeof ev !== 'object' || ev===null) return 'Invalid milestone entry';
      if(typeof ev.name !== 'string' || ev.name.trim()==='') return 'A milestone is missing a name';
      if(typeof ev.dateMs !== 'number') return 'A milestone has an invalid date';
      if(typeof ev.color !== 'string' || !/^#[0-9a-fA-F]{6}$/.test(ev.color)) return 'A milestone has an invalid color';
    }
  }

  return null; // 問題なし
}

function examImportData(e){
  const file = e.target.files[0];
  if(!file) return;

  // 拡張子チェック（軽い足切り。本体の検証はJSON内容で行う）
  if(!file.name.toLowerCase().endsWith('.json')){
    examShowToast(examL.toastImportError||'Import failed');
    e.target.value='';
    return;
  }

  const reader = new FileReader();
  reader.onload = (evt)=>{
    let data;
    try {
      data = JSON.parse(evt.target.result);
    } catch(err){
      examShowToast(examL.toastImportError||'Import failed');
      e.target.value='';
      return;
    }

    const validationError = examValidateImportData(data);
    if(validationError){
      examShowToast(examL.toastImportError||'Import failed');
      e.target.value='';
      return;
    }

    try {
      if(data.period){
        examPeriodStart = data.period.examPeriodStart ?? null;
        examPeriodEnd   = data.period.examPeriodEnd ?? null;
        examPeriodName  = typeof data.period.examPeriodName === 'string' ? data.period.examPeriodName : '';
        examCurrentPresetKey = typeof data.period.examCurrentPresetKey === 'string' ? data.period.examCurrentPresetKey : 'week';
        examDisplayMode = (data.period.examDisplayMode==='ring') ? 'ring' : 'segment';
      }
      if(Array.isArray(data.examEvents)){
        examEvents = data.examEvents.map(ev=>({
          id: typeof ev.id==='number' ? ev.id : Date.now()+Math.random(),
          name: ev.name.trim(),
          dateMs: ev.dateMs,
          color: ev.color
        }));
        examEvents.sort((a,b)=>a.dateMs-b.dateMs);
        examColorIdx = examEvents.length;
      }
      examSave();
      examRenderEventList();
      examBuildPresetTabs();
      document.getElementById('exam-viewModeSeg').classList.toggle('active', examDisplayMode==='segment');
      document.getElementById('exam-viewModeRing').classList.toggle('active', examDisplayMode==='ring');
      if(examPeriodStart!==null){
        document.getElementById('exam-periodStart').value=new Date(examPeriodStart).toISOString().split('T')[0];
        document.getElementById('exam-periodEnd').value=new Date(examPeriodEnd).toISOString().split('T')[0];
        document.getElementById('exam-periodName').value=examPeriodName;
      }
      examPlaySuccessSound();
      examShowToast(examL.toastImported||'Imported!');
    } catch(err){
      examShowToast(examL.toastImportError||'Import failed');
    }
  };
  reader.onerror = ()=>{
    examShowToast(examL.toastImportError||'Import failed');
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── 共有機能（画像として保存） ──
// 「正方形（そのまま）」と「ストーリー用 9:16 縦長」の2種類のレイアウトに対応。
// SNSごとに最適な比率が異なるため、ユーザーに選ばせる。
function examShareProgress(){
  const sizeMode = document.getElementById('exam-shareSizeSelect').value; // 'square' | 'story'
  const isLight = document.body.classList.contains('light-mode');
  const bgColor = isLight ? '#f8fafc' : '#0a0b10';
  const titleColor = '#6366f1';
  const subColor = isLight ? '#475569' : '#94a3b8';
  const footerColor = isLight ? '#cbd5e1' : '#334155';

  const now = new Date();
  const dateStr = examL.dateLabel ? examL.dateLabel(now) : now.toLocaleDateString();
  let progressLine = '';
  if(examPeriodStart!==null && examPeriodEnd!==null){
    const total = examGetTotalDays();
    const elapsed = Math.max(0, Math.min(total, examGetElapsedDays(now)));
    const pct = total>0 ? Math.round((elapsed/total)*100) : 0;
    progressLine = `${elapsed} / ${total} days · ${pct}%`;
  }

  const tempCanvas = document.createElement('examCanvas');
  const tctx = tempCanvas.getContext('2d');

  if(sizeMode==='story'){
    // Instagram/TikTokストーリー用: 1080×1920（9:16）
    const W2=1080, H2=1920;
    tempCanvas.width=W2; tempCanvas.height=H2;
    tctx.fillStyle=bgColor;
    tctx.fillRect(0,0,W2,H2);

    // 時計を中央付近に、余白を活かして少し小さめに配置
    const clockSize = W2 * 0.86;
    const clockX = (W2-clockSize)/2;
    const clockY = 260;
    tctx.drawImage(examCanvas, clockX, clockY, clockSize, clockSize);

    tctx.textAlign='center';
    tctx.font='bold 48px "DM Mono", sans-serif';
    tctx.fillStyle=titleColor;
    tctx.fillText(examPeriodName || 'Any Clock', W2/2, 140);

    const textY = clockY + clockSize + 90;
    tctx.font='28px "DM Mono", sans-serif';
    tctx.fillStyle=subColor;
    tctx.fillText(dateStr, W2/2, textY);

    if(progressLine){
      tctx.font='bold 34px "DM Mono", sans-serif';
      tctx.fillStyle=titleColor;
      tctx.fillText(progressLine, W2/2, textY+54);
    }

    tctx.font='20px "DM Mono", sans-serif';
    tctx.fillStyle=footerColor;
    tctx.fillText('Any Clock', W2/2, H2-60);

  } else {
    // 正方形（従来通り）
    const extraTop=90, extraBottom=130;
    tempCanvas.width=examCanvas.width;
    tempCanvas.height=examCanvas.height+extraTop+extraBottom;
    tctx.fillStyle=bgColor;
    tctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
    tctx.drawImage(examCanvas, 0, extraTop);

    tctx.textAlign='center';
    tctx.font='bold 30px "DM Mono", sans-serif';
    tctx.fillStyle=titleColor;
    tctx.fillText(examPeriodName || 'Any Clock', tempCanvas.width/2, 48);

    const yBase = tempCanvas.height - extraBottom + 30;
    tctx.font='18px "DM Mono", sans-serif';
    tctx.fillStyle=subColor;
    tctx.fillText(dateStr, tempCanvas.width/2, yBase);

    if(progressLine){
      tctx.font='bold 20px "DM Mono", sans-serif';
      tctx.fillStyle=titleColor;
      tctx.fillText(progressLine, tempCanvas.width/2, yBase+34);
    }

    tctx.font='13px "DM Mono", sans-serif';
    tctx.fillStyle=footerColor;
    tctx.fillText('Any Clock', tempCanvas.width/2, yBase+70);
  }

  tempCanvas.toBlob((blob)=>{
    if(navigator.share && navigator.canShare){
      const file = new File([blob], 'any-clock-progress.png', {type:'image/png'});
      const shareData = { files:[file], title:'Any Clock', text: examPeriodName||'My progress' };
      if(navigator.canShare(shareData)){
        navigator.share(shareData).catch(()=>{ examDownloadBlob(blob); });
        return;
      }
    }
    examDownloadBlob(blob);
  }, 'image/png');
}

function examDownloadBlob(blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'any-clock-progress.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  examShowToast(examL.toastShared||'Saved image!');
}

// ── 文字盤に描ききれなかったマイルストーンをテキストで通知 ──
// （狭いセグメント/リングにラベルを無理に押し込んで読めなくするより、
//   下部に「他にN件: A, B, C」と出す方が実用的）
function examUpdateOverflowNotice(items){
  const el=document.getElementById('exam-overflowNotice');
  if(!el) return;
  if(!items || items.length===0){
    el.classList.remove('show');
    el.innerHTML='';
    return;
  }
  const label = examL.overflowPrefix || 'Also:';
  const shown = items.slice(0,6);
  const extra = items.length>6 ? items.length-6 : 0;
  // クロック上の色付きマーカーと同じ色の丸印を添えることで、
  // 「この色は何のマイルストーンか」が一目で分かるようにする
  const itemsHtml = shown.map(it =>
    `<span class="overflow-notice-item"><span class="overflow-notice-dot" style="background:${it.color}"></span>${escapeHtmlExam(it.name)}</span>`
  ).join('');
  el.innerHTML = `<span class="overflow-notice-label">${label}</span>${itemsHtml}${extra ? ` <span class="overflow-notice-item">+${extra}</span>` : ''}`;
  el.classList.add('show');
}

function escapeHtmlExam(str){
  const d=document.createElement('div');
  d.textContent=str;
  return d.innerHTML;
}

// ライト/ダークモードは全タブ共通の toggleGlobalTheme() / loadGlobalTheme()（index.html側）に一本化。
// このタブの描画コードは draw() 内で getTheme() 経由で
// document.body.classList.contains('light-mode') を参照して配色を決める。

// ── Canvas描画 ──
function examPad(n){ return String(n).padStart(2,'0'); }
function examPolar(r,deg){ const a=(deg-90)*Math.PI/180; return [examCX+r*Math.cos(a),examCY+r*Math.sin(a)]; }

function examDrawHand(deg,tipR,backR,width,color){
  const a=(deg-90)*Math.PI/180;
  const tx=examCX+tipR*Math.cos(a),ty=examCY+tipR*Math.sin(a);
  const bx=examCX-backR*Math.cos(a),by=examCY-backR*Math.sin(a);
  examCtx.save();
  examCtx.shadowColor=color; examCtx.shadowBlur=20;
  examCtx.strokeStyle=color; examCtx.lineWidth=width; examCtx.lineCap='round';
  examCtx.beginPath(); examCtx.moveTo(bx,by); examCtx.lineTo(tx,ty); examCtx.stroke();
  examCtx.restore();
}

function examHexToRgb(hex){ return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }

// 期間内の日付→角度（0°=開始日, 360°=終了日）
function examDateToDeg(dateMs){
  if(!examPeriodStart||!examPeriodEnd) return 0;
  const pct=Math.min(1,Math.max(0,(dateMs-examPeriodStart)/(examPeriodEnd-examPeriodStart)));
  return pct*360;
}

function examGetTotalDays(){
  if(!examPeriodStart||!examPeriodEnd) return 0;
  return Math.round((examPeriodEnd-examPeriodStart)/86400000);
}

function examGetElapsedDays(now){
  if(!examPeriodStart) return 0;
  return Math.floor((now.getTime()-examPeriodStart)/86400000);
}

function examUpdateCenterDisplay(){
  const now=new Date(); now.setHours(0,0,0,0);
  if(!examPeriodStart||!examPeriodEnd){
    document.getElementById('exam-centerNum').textContent='--';
    document.getElementById('exam-centerLabel').textContent=examL.centerLabelSet;
    return;
  }
  const total=examGetTotalDays();
  const elapsed=Math.max(0,Math.min(total,examGetElapsedDays(now)));
  const pct=total>0?Math.round((elapsed/total)*100):0;
  document.getElementById('exam-centerNum').textContent=`${elapsed}/${total}`;
  document.getElementById('exam-centerLabel').textContent=`${examPeriodName} · ${examL.percentDone(pct)}`;
}

// ── マイルストーン描画：連続セグメント方式 ──
// 「今日→予定1」「予定1→予定2」…と隙間なく単一リングを区切って色分けする
function examDrawMilestonesSegment(now, now0, nowDeg){
  const segOuter=286, segInner=100;
  const now0forSort=new Date(now); now0forSort.setHours(0,0,0,0);
  const overflowLabels = []; // ラベルを描画しきれなかったマイルストーン名を集める

  const futureEvents = examEvents
    .filter(ev => ev.dateMs >= now0forSort.getTime())
    .sort((a,b)=>a.dateMs-b.dateMs);

  const boundaryDegs = [nowDeg, ...futureEvents.map(ev=>examDateToDeg(ev.dateMs))];
  const normalizedDegs = boundaryDegs.map((d,idx)=>{
    if(idx===0) return d;
    let dd=d;
    while(dd < boundaryDegs[idx-1]) dd += 360;
    return dd;
  });

  futureEvents.forEach((ev,i)=>{
    const segStartDeg = normalizedDegs[i];
    const segEndDeg   = normalizedDegs[i+1];
    if(segEndDeg <= segStartDeg) return;

    const startA=(segStartDeg-90)*Math.PI/180;
    const endA=(segEndDeg-90)*Math.PI/180;
    const [rv,gv,bv]=examHexToRgb(ev.color);

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,segOuter,startA,endA,false);
    examCtx.arc(examCX,examCY,segInner,endA,startA,true);
    examCtx.closePath();
    examCtx.fillStyle=`rgba(${rv},${gv},${bv},0.26)`;
    examCtx.fill();
    examCtx.restore();

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,segOuter,startA,endA,false);
    examCtx.arc(examCX,examCY,segInner,endA,startA,true);
    examCtx.closePath();
    const grad=examCtx.createRadialGradient(examCX,examCY,segInner,examCX,examCY,segOuter);
    grad.addColorStop(0,  `rgba(${rv},${gv},${bv},0.20)`);
    grad.addColorStop(0.6,`rgba(${rv},${gv},${bv},0.50)`);
    grad.addColorStop(1,  `rgba(${rv},${gv},${bv},0.75)`);
    examCtx.fillStyle=grad;
    examCtx.shadowColor=ev.color; examCtx.shadowBlur=14;
    examCtx.fill();
    examCtx.restore();

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,segOuter,startA,endA);
    examCtx.strokeStyle=`rgba(${rv},${gv},${bv},0.9)`;
    examCtx.lineWidth=3; examCtx.shadowColor=ev.color; examCtx.shadowBlur=12;
    examCtx.stroke();
    examCtx.restore();

    examCtx.save();
    const [bx1,by1]=examPolar(segOuter,segStartDeg);
    const [bx2,by2]=examPolar(segInner,segStartDeg);
    examCtx.beginPath(); examCtx.moveTo(bx1,by1); examCtx.lineTo(bx2,by2);
    examCtx.strokeStyle='rgba(10,11,16,0.9)';
    examCtx.lineWidth=2.5; examCtx.stroke();
    examCtx.restore();

    const midR=(segOuter+segInner)/2;
    const midDeg=(segStartDeg+segEndDeg)/2;
    const [lx,ly]=examPolar(midR,midDeg);
    const segSpan=segEndDeg-segStartDeg;

    // セグメントが狭すぎる場合はラベルを描画しない
    // （無理に縮小して読めない文字を出すより、下部のオーバーフローリストに委ねる）
    const MIN_SPAN_FOR_LABEL = 7; // これ未満の角度幅はラベル省略
    if(segSpan >= MIN_SPAN_FOR_LABEL){
      const fontSize=Math.max(13,Math.min(22,segSpan/5));
      examCtx.save();
      examCtx.font=`bold ${fontSize}px "DM Mono","Noto Sans JP","Noto Sans KR",sans-serif`;
      examCtx.textAlign='center'; examCtx.textBaseline='middle';
      const maxC=Math.max(5,Math.floor(segSpan/6));
      const label=ev.name.length>maxC?ev.name.slice(0,maxC-1)+'…':ev.name;
      // 背景色（マイルストーンの色）が明るい場合でも確実に読めるよう、
      // 文字の後ろに濃い不透明の帯を敷いてから白文字を描画する
      const chipW=examCtx.measureText(label).width + fontSize*1.0;
      const chipH=fontSize*1.6;
      examCtx.fillStyle='#050609';
      examCtx.fillRect(lx-chipW/2, ly-chipH/2, chipW, chipH);
      examCtx.fillStyle='#ffffff';
      examCtx.fillText(label,lx,ly);
      examCtx.restore();
    } else {
      overflowLabels.push({name: ev.name, color: ev.color});
    }

    const [emx,emy]=examPolar(midR,segEndDeg);
    examCtx.beginPath(); examCtx.arc(emx,emy,8,0,Math.PI*2);
    examCtx.fillStyle=`rgba(${rv},${gv},${bv},1)`;
    examCtx.shadowColor=ev.color; examCtx.shadowBlur=18;
    examCtx.fill();
    examCtx.beginPath(); examCtx.arc(emx,emy,3.5,0,Math.PI*2);
    examCtx.fillStyle='rgba(255,255,255,0.95)';
    examCtx.shadowBlur=0; examCtx.fill();
  });

  const pastEvents = examEvents.filter(ev => ev.dateMs < now0forSort.getTime());
  pastEvents.forEach(ev=>{
    const targetDeg=examDateToDeg(ev.dateMs);
    const [rv,gv,bv]=examHexToRgb(ev.color);
    const [px,py]=examPolar(300,targetDeg);
    examCtx.beginPath(); examCtx.arc(px,py,5,0,Math.PI*2);
    examCtx.fillStyle=`rgba(${rv},${gv},${bv},0.35)`;
    examCtx.fill();
  });

  examUpdateOverflowNotice(overflowLabels);
}

// ── マイルストーン描画：階層リング方式 ──
// 各予定を独立したリングとして重ねる（残り日数が短いものほど外側）
function examDrawMilestonesRing(now, now0, nowDeg){
  const outerMax=286, innerMin=25;
  const ringH=Math.min(70,Math.max(38,Math.floor((outerMax-innerMin)/examEvents.length)-6));
  const gap=6;
  const overflowLabels = []; // リング幅が足りず描画できなかったマイルストーン名

  const now0forSort=new Date(now); now0forSort.setHours(0,0,0,0);
  const sortedEvents = [...examEvents].sort((a,b)=>{
    const remA = a.dateMs - now0forSort.getTime();
    const remB = b.dateMs - now0forSort.getTime();
    return remA - remB;
  });

  sortedEvents.forEach((ev,i)=>{
    const outerR=outerMax-i*(ringH+gap);
    const innerR=outerR-ringH;
    if(innerR<innerMin){ overflowLabels.push({name: ev.name, color: ev.color}); return; }

    const targetDeg=examDateToDeg(ev.dateMs);
    const startA=(nowDeg-90)*Math.PI/180;
    const endA=(targetDeg-90)*Math.PI/180;
    const [rv,gv,bv]=examHexToRgb(ev.color);
    const isPast = ev.dateMs < now0.getTime();

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,outerR,startA,endA,isPast);
    examCtx.arc(examCX,examCY,innerR,endA,startA,!isPast);
    examCtx.closePath();
    examCtx.fillStyle=`rgba(${rv},${gv},${bv},${isPast?0.12:0.24})`;
    examCtx.fill();
    examCtx.restore();

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,outerR,startA,endA,isPast);
    examCtx.arc(examCX,examCY,innerR,endA,startA,!isPast);
    examCtx.closePath();
    const grad=examCtx.createRadialGradient(examCX,examCY,innerR,examCX,examCY,outerR);
    grad.addColorStop(0,  `rgba(${rv},${gv},${bv},${isPast?0.08:0.20})`);
    grad.addColorStop(0.6,`rgba(${rv},${gv},${bv},${isPast?0.18:0.48})`);
    grad.addColorStop(1,  `rgba(${rv},${gv},${bv},${isPast?0.28:0.72})`);
    examCtx.fillStyle=grad;
    examCtx.shadowColor=ev.color; examCtx.shadowBlur=isPast?6:16;
    examCtx.fill();
    examCtx.restore();

    examCtx.save();
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,outerR,startA,endA,isPast);
    examCtx.strokeStyle=`rgba(${rv},${gv},${bv},${isPast?0.3:0.9})`;
    examCtx.lineWidth=2.5; examCtx.shadowColor=ev.color; examCtx.shadowBlur=isPast?4:10;
    examCtx.stroke();
    examCtx.restore();

    const midR=(outerR+innerR)/2;
    const midDeg=(nowDeg+targetDeg)/2;
    const [lx,ly]=examPolar(midR,midDeg);
    const fontSize=Math.max(13,Math.min(20,ringH/3.2));
    examCtx.save();
    examCtx.font=`bold ${fontSize}px "DM Mono","Noto Sans JP","Noto Sans KR",sans-serif`;
    examCtx.textAlign='center'; examCtx.textBaseline='middle';
    const maxC=Math.max(5,Math.floor(ringH/fontSize*2.4));
    const label=ev.name.length>maxC?ev.name.slice(0,maxC-1)+'…':ev.name;
    // 背景色（マイルストーンの色）に関わらず読めるよう、文字の後ろに濃い不透明の帯を敷く（過去分は少し薄く）
    examCtx.globalAlpha=isPast?0.6:1;
    const chipW=examCtx.measureText(label).width + fontSize*1.0;
    const chipH=fontSize*1.6;
    examCtx.fillStyle='#050609';
    examCtx.fillRect(lx-chipW/2, ly-chipH/2, chipW, chipH);
    examCtx.fillStyle='#ffffff';
    examCtx.fillText(label,lx,ly);
    examCtx.restore();

    const [emx,emy]=examPolar(midR,targetDeg);
    examCtx.beginPath(); examCtx.arc(emx,emy,8,0,Math.PI*2);
    examCtx.fillStyle=`rgba(${rv},${gv},${bv},${isPast?0.4:1})`;
    examCtx.shadowColor=ev.color; examCtx.shadowBlur=isPast?6:18;
    examCtx.fill();
    examCtx.beginPath(); examCtx.arc(emx,emy,3.5,0,Math.PI*2);
    examCtx.fillStyle=isPast?`rgba(${rv},${gv},${bv},0.5)`:'rgba(255,255,255,0.95)';
    examCtx.shadowBlur=0; examCtx.fill();
  });

  examUpdateOverflowNotice(overflowLabels);
}

function examDraw(){
  const now=new Date();
  const T = examGetTheme();
  examCtx.clearRect(0,0,examW,examW);

  // 背景
  const bg=examCtx.createRadialGradient(examCX,examCY,0,examCX,examCY,440);
  bg.addColorStop(0,T.bgGradInner); bg.addColorStop(1,T.bgGradOuter);
  examCtx.beginPath(); examCtx.arc(examCX,examCY,440,0,Math.PI*2);
  examCtx.fillStyle=bg; examCtx.fill();

  examCtx.beginPath(); examCtx.arc(examCX,examCY,448,0,Math.PI*2);
  examCtx.strokeStyle=T.outerRing; examCtx.lineWidth=4; examCtx.stroke();

  const hasPeriod = examPeriodStart && examPeriodEnd;
  const totalDays = hasPeriod ? examGetTotalDays() : 0;

  // ── 外周：期間の目盛り（動的分割） ──
  // 短い期間（週・月）は日数表示、長い期間（四半期・年・長期カスタム）は月表示にする
  const useMonthLabels = totalDays > 35;
  let divisions;
  if(useMonthLabels){
    divisions = Math.max(2, Math.min(24, Math.round(totalDays/30.44)));
  } else if(totalDays<=7) divisions=7;
  else divisions=10;

  if(hasPeriod){
    for(let i=0;i<=divisions;i++){
      const deg=i/divisions*360;
      if(deg>360) break;
      const isMajor=true;
      const [x1,y1]=examPolar(448,deg); const [x2,y2]=examPolar(410,deg);
      examCtx.beginPath(); examCtx.moveTo(x1,y1); examCtx.lineTo(x2,y2);
      examCtx.strokeStyle=T.tickMajor; examCtx.lineWidth=3.5; examCtx.lineCap='round'; examCtx.stroke();

      // 中間目盛り
      if(i<divisions){
        for(let s=1;s<4;s++){
          const sd=deg+s*(360/divisions/4);
          const [sx1,sy1]=examPolar(448,sd); const [sx2,sy2]=examPolar(434,sd);
          examCtx.beginPath(); examCtx.moveTo(sx1,sy1); examCtx.lineTo(sx2,sy2);
          examCtx.strokeStyle=T.tickMinor; examCtx.lineWidth=1.8; examCtx.stroke();
        }
      }

      // ラベル（長期間は経過月数、短期間は経過日数）
      // 最後の目盛り（i===divisions、角度360°）は最初の目盛り（0°）と同じ位置になるため、
      // ラベルが重なって読めなくなる。目盛り線だけ描いてラベルは省略する。
      if(i<divisions){
      const [lx,ly]=examPolar(460,deg);
      examCtx.save();
      examCtx.font='bold 20px "DM Mono","Noto Sans JP","Noto Sans KR",sans-serif';
      examCtx.fillStyle=T.tickLabel;
      examCtx.shadowColor=T.tickLabelGlow; examCtx.shadowBlur=6;
      examCtx.textAlign='center'; examCtx.textBaseline='middle';
      let label;
      if(useMonthLabels){
        const dayAtTick = i/divisions*totalDays;
        const tickDate = new Date(examPeriodStart + dayAtTick*24*3600*1000);
        const monthNames = EXAM_MONTH_NAMES[examLang] || EXAM_MONTH_NAMES.en;
        label = monthNames[tickDate.getMonth()];
      } else if(totalDays<=7){
        // 週表示：曜日 + 実際の日付（日）の両方を表示する
        const dayAtTick = i/divisions*totalDays;
        const tickDate = new Date(examPeriodStart + dayAtTick*24*3600*1000);
        const weekdayNames = EXAM_WEEKDAY_NAMES[examLang] || EXAM_WEEKDAY_NAMES.en;
        const wd = weekdayNames[tickDate.getDay()];
        label = /^[a-zA-Z]/.test(wd) ? `${wd} ${tickDate.getDate()}` : `${wd}${tickDate.getDate()}`;
      } else {
        // 週より長いが月表示にはまだ満たない期間：実際の日付（日）＋言語ごとの単位を表示
        const dayAtTick = i/divisions*totalDays;
        const tickDate = new Date(examPeriodStart + dayAtTick*24*3600*1000);
        const dayUnit = EXAM_DAY_UNIT[examLang] || '';
        label = `${tickDate.getDate()}${dayUnit}`;
      }
      examCtx.fillText(label,lx,ly);
      examCtx.restore();
      }
    }
  } else {
    // 期間未設定時は12分割の汎用目盛り
    for(let i=0;i<12;i++){
      const deg=i*30;
      const [x1,y1]=examPolar(448,deg); const [x2,y2]=examPolar(418,deg);
      examCtx.beginPath(); examCtx.moveTo(x1,y1); examCtx.lineTo(x2,y2);
      examCtx.strokeStyle=T.tickMinor; examCtx.lineWidth=2.5; examCtx.lineCap='round'; examCtx.stroke();
    }
  }

  examCtx.beginPath(); examCtx.arc(examCX,examCY,406,0,Math.PI*2);
  examCtx.strokeStyle=T.tickMinor; examCtx.lineWidth=1.5; examCtx.stroke();

  // ── 内側フェイス ──
  examCtx.beginPath(); examCtx.arc(examCX,examCY,290,0,Math.PI*2);
  examCtx.fillStyle=T.innerFace; examCtx.fill();
  examCtx.strokeStyle=T.innerRingStroke; examCtx.lineWidth=1; examCtx.stroke();

  if(hasPeriod){
    const now0=new Date(now); now0.setHours(0,0,0,0);
    const nowDeg=examDateToDeg(now0.getTime()+ (now.getHours()*3600+now.getMinutes()*60+now.getSeconds())*1000);

    // 経過弧
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,428,-Math.PI/2,-Math.PI/2+(nowDeg/360)*Math.PI*2);
    examCtx.strokeStyle=T.progressArc;
    examCtx.lineWidth=10; examCtx.lineCap='round'; examCtx.stroke();

    // ── マイルストーン描画：モードに応じて分岐 ──
    if(examEvents.length>0){
      if(examDisplayMode==='segment'){
        examDrawMilestonesSegment(now, now0, nowDeg);
      } else {
        examDrawMilestonesRing(now, now0, nowDeg);
      }
    }

    // 針（現在位置）
    examDrawHand(nowDeg, 400, 30, 7, T.handColor);
    const [hx,hy]=examPolar(400,nowDeg);
    examCtx.beginPath(); examCtx.arc(hx,hy,9,0,Math.PI*2);
    examCtx.fillStyle=T.handTip;
    examCtx.shadowColor=T.handColor; examCtx.shadowBlur=20;
    examCtx.fill(); examCtx.shadowBlur=0;
  }

  // 中心キャップ
  examCtx.beginPath(); examCtx.arc(examCX,examCY,22,0,Math.PI*2);
  examCtx.fillStyle=T.innerFace; examCtx.fill();
  examCtx.strokeStyle=T.handColor; examCtx.lineWidth=3;
  examCtx.shadowColor=T.progressArc; examCtx.shadowBlur=8;
  examCtx.stroke(); examCtx.shadowBlur=0;
  examCtx.beginPath(); examCtx.arc(examCX,examCY,9,0,Math.PI*2);
  examCtx.fillStyle=T.handTip; examCtx.fill();

  // マイルストーン到達時の視覚フィードバック：中心から広がる短いパルスリング
  // （効果音の代わりとして、画面を見ていれば必ず気づける形の演出にしている）
  const nowMs = performance.now();
  if(nowMs < _examClockFlashUntil){
    const remain = _examClockFlashUntil - nowMs; // 900ms → 0ms
    const progress = 1 - (remain/900); // 0→1
    const pulseR = 22 + progress*60;
    const pulseAlpha = Math.max(0, 0.6 * (1-progress));
    examCtx.beginPath();
    examCtx.arc(examCX,examCY,pulseR,0,Math.PI*2);
    examCtx.strokeStyle=`rgba(52,211,153,${pulseAlpha})`;
    examCtx.lineWidth=3;
    examCtx.stroke();
  }

  examUpdateCenterDisplay();
  requestAnimationFrame(examDraw);
}

examLoad();
examBuildPresetTabs();
examRenderEventList();
examBuildColorPicker('exam-newEventColorRow', examSelectedNewColor, 'examPickNewColor');

document.getElementById('exam-viewModeRing').classList.toggle('active', examDisplayMode==='ring');

// 初回起動時、期間未設定なら「週間」をデフォルト選択
if(!examPeriodStart){
  examSelectPresetSafe('week');
}
function examSelectPresetSafe(key){
  examCurrentPresetKey=key;
  const presets=examGetPresets();
  const preset=presets.find(p=>p.key===key);
  const today=new Date(); today.setHours(0,0,0,0);
  const end=new Date(today.getTime()+preset.days*86400000);
  examPeriodStart=today.getTime();
  examPeriodEnd=end.getTime();
  examPeriodName=preset.label;
  document.getElementById('exam-periodStart').value=today.toISOString().split('T')[0];
  document.getElementById('exam-periodEnd').value=end.toISOString().split('T')[0];
  document.getElementById('exam-periodName').value=preset.label;
  examSave();
}
if(examPeriodStart){
  document.getElementById('exam-periodStart').value=new Date(examPeriodStart).toISOString().split('T')[0];
  document.getElementById('exam-periodEnd').value=new Date(examPeriodEnd).toISOString().split('T')[0];
  document.getElementById('exam-periodName').value=examPeriodName;
}

examDraw();

// マイルストーン当日到達チェック：起動時に一度、以降は1時間おきに確認する
// （毎フレーム実行する必要はなく、日付が変わるタイミングだけ拾えれば十分）
examCheckTodaysMilestones();
setInterval(examCheckTodaysMilestones, 60*60*1000);

// ══════════════════════════════
// キーボード操作対応
// ══════════════════════════════

// Enterキーでの送信（各入力欄がフォーカスされている状態でEnterを押すと該当のボタンを押したことにする）
document.getElementById('exam-newEventName').addEventListener('keydown', e=>{
  if(e.key==='Enter') examAddEvent();
});
document.getElementById('exam-newEventDate').addEventListener('keydown', e=>{
  if(e.key==='Enter') examAddEvent();
});
document.getElementById('exam-periodName').addEventListener('keydown', e=>{
  if(e.key==='Enter') examSetCustomPeriod();
});
document.getElementById('exam-periodEnd').addEventListener('keydown', e=>{
  if(e.key==='Enter') examSetCustomPeriod();
});
document.getElementById('exam-editEventName').addEventListener('keydown', e=>{
  if(e.key==='Enter') examSaveEditedEvent();
});
document.getElementById('exam-editEventDate').addEventListener('keydown', e=>{
  if(e.key==='Enter') examSaveEditedEvent();
});

// Escキーで開いているモーダルを閉じる（削除確認は誤操作防止のためキャンセル扱い）
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape') return;
  if(document.getElementById('exam-editModalOverlay').classList.contains('on')) examCloseEditModal();
  else if(document.getElementById('exam-confirmModalOverlay').classList.contains('on')) examCloseConfirmModal();
  else if(document.getElementById('exam-pregModalOverlay').classList.contains('on')) examClosePregnancyModal();
  else if(document.getElementById('exam-rangeModalOverlay').classList.contains('on')) examCloseRangeModal();
});

function toggleGlobalTheme(){
  const isLight = document.body.classList.toggle('light-mode');
  document.getElementById('globalThemeToggle').textContent = isLight ? '☀️' : '🌙';
  try { localStorage.setItem('mc_theme', isLight ? 'light' : 'dark'); } catch(e){}
}
function loadGlobalTheme(){
  try {
    const t = localStorage.getItem('mc_theme');
    if(t==='light'){
      document.body.classList.add('light-mode');
      document.getElementById('globalThemeToggle').textContent='☀️';
    }
  } catch(e){}
}

// ── 初期化 ──
loadGlobalTheme();

</script>
